name: Generate Key Daily
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
jobs:
  generate-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          KEY="KIKO_$(date +%s%N | cut -b1-13)"
          echo "$KEY" >> keys.txt
      - run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add keys.txt
          git commit -m "Add key" || true
          git push
